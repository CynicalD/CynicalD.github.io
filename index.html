<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayan Hassan | Links</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 26px;
            margin-bottom: 10px;
            color: #ffffff;
        }
        .intro-text {
            font-size: 16px;
            color: #8b949e;
            line-height: 1.5;
            margin-bottom: 30px;
            padding: 0 10px;
        }
        .highlight {
            color: #c9d1d9;
            font-weight: 600;
        }
        .link-btn {
            display: block;
            width: 100%;
            padding: 15px 0;
            margin-bottom: 15px;
            background-color: #21262d; 
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid #30363d;
            font-weight: 600;
            transition: all 0.2s ease-in-out;
        }

        /* resume */
        .resume-btn {
            background-color: #238636;
            border-color: #2ea043;
        }
        .resume-btn:hover { background-color: #2ea043; }

        /* LockedIn */
        .linkedin-btn {
            background-color: #0a66c2;
            border-color: #0077b5;
        }
        .linkedin-btn:hover { background-color: #0077b5; }

        /* the hub */
        .github-btn {
            background-color: #6e40c9;
            border-color: #5865f2;
        }
        .github-btn:hover { background-color: #5865f2; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hi, I'm Rayan 👋</h1>
        <p class="intro-text">
            I'm a 3rd-year Computer Science student at Carleton University with experience in <span class="highlight">full-stack and systems engineering</span>. I'm actively seeking software engineering internship opportunities for <span class="highlight">Fall 2026</span>.
        </p>

        <a href="resume.pdf" class="link-btn resume-btn" target="_blank">📄 View Resume</a>
        <a href="https://www.linkedin.com/in/rayan-hassan-b571b7245" class="link-btn linkedin-btn" target="_blank">💼 LinkedIn</a>
        <a href="https://github.com/CynicalD" class="link-btn github-btn" target="_blank">💻 GitHub Portfolio</a>
    </div>
</body>
</html>
